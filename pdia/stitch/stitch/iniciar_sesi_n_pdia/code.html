<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AgroPrecision - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "primary-container": "#2d5a27",
                        "on-primary": "#ffffff",
                        "background": "#f7faf5",
                        "tertiary-container": "#005484",
                        "on-primary-fixed": "#002201",
                        "on-surface-variant": "#42493e",
                        "surface-variant": "#e0e3df",
                        "on-primary-fixed-variant": "#23501e",
                        "secondary": "#7a5649",
                        "on-tertiary-fixed": "#001d32",
                        "on-background": "#191c1a",
                        "error-container": "#ffdad6",
                        "secondary-container": "#fdcdbc",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#bcf0ae",
                        "surface-tint": "#3b6934",
                        "primary-fixed-dim": "#a1d494",
                        "outline-variant": "#c2c9bb",
                        "surface-container-low": "#f1f4ef",
                        "on-secondary-fixed-variant": "#603f33",
                        "on-tertiary-container": "#8dc8ff",

                        "on-secondary-fixed": "#2e150b",
                        "tertiary-fixed": "#cee5ff",
                        "tertiary": "#003c60",
                        "tertiary-fixed-dim": "#96ccff",
                        "surface-container-highest": "#e0e3df",
                        "on-tertiary-fixed-variant": "#004a75",
                        "on-surface": "#191c1a",
                        "inverse-on-surface": "#eff2ed",

                    "borderRadius": {

                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]

            },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .grain-overlay {
            position: relative;
        }
        .grain-overlay::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-background min-h-screen flex flex-col grain-overlay">
<!-- Hero Background Section -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover opacity-10" data-alt="expansive view of orderly green agricultural crop rows stretching towards the horizon under a soft morning mist with golden sunlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDR8-wdDOdt8rvisyaYy6SZFYcascBoq7ezFwntkvbf2KM0MejZ_ifVKj5wAhM62uL8DUPQV9vQs4xB0Vsj4a_1pMBonTPbxT7SsMAgNfcM9SZT60YeHBqJq2um3S2YFH06cjkMSkIlTcw_iNbHMZp4PUy30-JojlKeiz6bCsddUlRWJxzwhn7xTTimvJsNDNDhPr-iMdNgWGlXgZi1OdyJ78nG45j8ZgUxL0pkZtX-gQ4QGrE-Z13pXslIFuUynFz-tJB5ClAZ7xk"/>
<div class="absolute inset-0 bg-gradient-to-b from-surface via-transparent to-surface opacity-90"></div>
</div>
<!-- Main Content -->
<main class="relative z-10 flex-1 flex items-center justify-center p-6 md:p-12">
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="text-center mb-10">
<div class="flex justify-center mb-4">
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-4xl" data-icon="agriculture" style="font-variation-settings: 'FILL' 1;">agriculture</span>
</div>
</div>
<h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight">AgroPrecision</h1>
<p class="text-on-surface-variant font-medium mt-2">Accede a tu panel de agronomía</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl space-y-8">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="email">
                            Correo electrónico
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all font-body" id="email" name="email" placeholder="nombre@empresa.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-medium text-on-surface-variant font-label" for="password">
                                Contraseña
                            </label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-4 bg-surface-container-low border-0 rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all font-body" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="text-right">
<a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" href="#">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold text-lg rounded-lg shadow-sm hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Entrar
                        <span class="material-symbols-outlined text-2xl">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-[1px] bg-outline-variant/30"></div>
<span class="text-xs font-semibold text-outline tracking-widest uppercase">O continuar con</span>
<div class="flex-1 h-[1px] bg-outline-variant/30"></div>
</div>
<!-- SSO Placeholder Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 border-0 bg-surface-container-high rounded-lg font-medium text-on-surface-variant hover:bg-surface-variant transition-colors">
<img alt="Google" class="w-4 h-4 opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtP3rt3w64-_mdZ1YRoMUgTtsPOoqHWMJw0aOZ95NVbLyzYsNysuoqQ-q2uLIrYDO2XZR0T9S4CIfO-MWIz-7n8izQMxCHV-YHlNxGuC5KV3kTBUZq0jOitsvH7vUc7_bHfvPjHsZBabqUAyLQ0MbqVmhewlMgLPH0jFNiVCm_N0FgeWO5UgkraMnghSz7CfBPtsfxCAdc4_Kxf6yPB6HqW4Lmu1_4UfwObio2Qw4tAa-TcAEQ7JOGD2Yy0spiY2-8tMuyeYp-SxU"/>
<span class="text-sm">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 border-0 bg-surface-container-high rounded-lg font-medium text-on-surface-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-xl text-primary">id_card</span>
<span class="text-sm">Corporativo</span>
</button>
</div>
</div>
<!-- Simple Footer -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant font-medium">
                    ¿No tienes una cuenta? 
                    <a class="text-primary font-bold ml-1 hover:underline decoration-2 underline-offset-4" href="#">
                        Registrarse
                    </a>
</p>
<div class="mt-12 flex justify-center gap-6 opacity-40">
<a class="text-xs font-semibold uppercase tracking-tighter" href="#">Privacidad</a>
<a class="text-xs font-semibold uppercase tracking-tighter" href="#">Términos</a>
<a class="text-xs font-semibold uppercase tracking-tighter" href="#">Soporte</a>
</div>
</footer>
</div>
</main>
<!-- Aesthetic Corner Element -->
<div class="fixed bottom-0 right-0 p-8 hidden lg:block opacity-20 pointer-events-none">
<div class="flex flex-col items-end">
<span class="text-display-lg font-headline font-extrabold text-primary select-none">PRECISIÓN</span>
<span class="text-display-lg font-headline font-extrabold text-secondary select-none -mt-4">ORGÁNICA</span>
</div>
</div>
</body></html>
