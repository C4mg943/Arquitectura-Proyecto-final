services:
  # ============================================
  # MESSAGE BROKER - RabbitMQ
  # ============================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: pdia-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    networks:
      - pdia-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # DATABASE - PostgreSQL (Compartida)
  # ============================================
  postgres:
    image: postgres:15
    container_name: pdia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pdia_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - pdia-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # API GATEWAY - nginx
  # ============================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: pdia-api-gateway
    ports:
      - "8000:80"      # HTTP
      - "8443:443"      # HTTPS
    depends_on:
      auth-service:
        condition: service_healthy
      farm-service:
        condition: service_healthy
      crop-service:
        condition: service_healthy
      activity-service:
        condition: service_healthy
      weather-service:
        condition: service_healthy
      alert-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - pdia-network

  # ============================================
  # MICROSERVICIOS
  # ============================================

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: pdia-auth-service
    environment:
      NODE_ENV: docker
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pdia_db
      DB_USER: postgres
      DB_PASSWORD: password
      JWT_SECRET: pdia-secret-key-change-in-production
      JWT_EXPIRATION: 7d
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - pdia-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', (e) => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  farm-service:
    build:
      context: ./farm-service
      dockerfile: Dockerfile
    container_name: pdia-farm-service
    environment:
      NODE_ENV: docker
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pdia_db
      DB_USER: postgres
      DB_PASSWORD: password
      AUTH_SERVICE_URL: http://auth-service:3001
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      JWT_SECRET: pdia-secret-key-change-in-production
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - pdia-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health', (res) => { if (res.statusCode === 200) process.exit(0); else process.exit(1); }).on('error', (e) => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  crop-service:
    build:
      context: ./crop-service
      dockerfile: Dockerfile
    container_name: pdia-crop-service
    environment:
      NODE_ENV: docker
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pdia_db
      DB_USER: postgres
      DB_PASSWORD: password
      FARM_SERVICE_URL: http://farm-service:3002
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      JWT_SECRET: pdia-secret-key-change-in-production
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
