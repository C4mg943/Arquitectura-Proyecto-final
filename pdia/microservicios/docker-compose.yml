    restart: unless-stopped

  weather-service:
    build:
      context: ./weather-service
      dockerfile: Dockerfile
    container_name: pdia-weather-service
    environment:
      NODE_ENV: docker
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pdia_db
      DB_USER: postgres
      DB_PASSWORD: password
      OPEN_METEO_BASE_URL: https://api.open-meteo.com/v1
